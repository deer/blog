name: Deploy
on:
  push:
    branches: [main]
  pull_request:
    branches: main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Build step
        run: "deno task build"

      - name: Verify build output
        run: test -f _fresh/server.js || (echo "Build output _fresh/server.js not found" && exit 1)

      - name: Upload to Deno Deploy
        uses: denoland/deployctl@v1
        with:
          project: "rvr-blog"
          entrypoint: "_fresh/server.js"
