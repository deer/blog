name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v6

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Verify formatting, lint, and types
        run: deno task ok

      - name: Build step
        run: deno task build

      - name: Verify build output
        run: test -f _fresh/server.js || (echo "Build output _fresh/server.js not found" && exit 1)
